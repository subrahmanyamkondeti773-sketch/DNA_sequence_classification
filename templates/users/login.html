{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login | DNA Classification System{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card glass-card p-4 p-lg-5">
                <div class="text-center mb-4">
                    <div class="auth-icon mb-3">🔬</div>
                    <h2 class="auth-title">Welcome Back</h2>
                    <p class="text-muted">Sign in to your DNA Classification account</p>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% crispy form %}
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted mb-0">Don't have an account?
                        <a href="{% url 'register' %}" class="text-primary fw-semibold">Register free</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
